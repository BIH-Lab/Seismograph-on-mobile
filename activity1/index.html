<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지진파 색으로 보기</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="activity-page" id="activity-body">

    <header class="activity-header">
        <a href="../" class="btn btn--ghost btn--sm">← 목록</a>
        <h1>지진파 색으로 보기</h1>
    </header>

    <main class="activity-main">

        <!-- 배경색 시각화 영역 -->
        <div class="color-display" id="color-display">
            <p class="color-display__label" id="magnitude-label">0.000</p>
            <p class="color-display__unit">m/s²</p>
        </div>

        <!-- 파형 그래프 -->
        <div class="chart-wrapper">
            <canvas id="waveChart"></canvas>
        </div>

        <!-- 컨트롤 -->
        <div class="controls">
            <button class="btn btn--primary btn--lg" id="start-btn">측정 시작</button>
            <button class="btn btn--danger btn--lg" id="stop-btn" hidden>측정 정지</button>
        </div>

        <!-- 상태 메시지 -->
        <p class="status-msg" id="status-msg">버튼을 눌러 센서 권한을 요청하세요.</p>

    </main>

    <script src="../assets/js/sensor.js"></script>
    <script src="../assets/js/visual.js"></script>

    <script>
        const startBtn  = document.getElementById('start-btn');
        const stopBtn   = document.getElementById('stop-btn');
        const statusMsg = document.getElementById('status-msg');

        // false = 측정 정지 모드, true = 초기화 모드
        let _pendingReset = false;

        function _resetStopBtn() {
            stopBtn.textContent = '측정 정지';
            stopBtn.className   = 'btn btn--danger btn--lg';
            _pendingReset       = false;
        }

        startBtn.addEventListener('click', () => {
            startBtn.hidden = true;
            stopBtn.hidden  = true;
            _resetStopBtn();
            statusMsg.textContent = '측정 중...';

            SensorModule.start(
                (data) => {
                    if (typeof VisualModule !== 'undefined') VisualModule.update(data);
                },
                (msg) => {
                    statusMsg.textContent = '오류: ' + msg;
                    stopBtn.hidden  = true;
                    startBtn.hidden = false;
                    _resetStopBtn();
                },
                (state, source) => {
                    if (state === 'calibrating') {
                        statusMsg.textContent = '기준값 설정 중...';
                    } else if (state === 'ready') {
                        const srcLabel = source === 'generic'      ? ' (Generic Sensor API — 고정밀)'
                                       : source === 'devicemotion' ? ' (DeviceMotionEvent — 일반)'
                                       : '';
                        statusMsg.textContent = '측정 중' + srcLabel + ' — 시작 시점 대비 변화량을 표시합니다.';
                        stopBtn.hidden = false;
                    } else if (state === 'unavailable') {
                        statusMsg.textContent = '⚠️ 이 기기에서 센서 데이터를 읽을 수 없습니다. Chrome 설정 > 사이트 설정 > 동작 센서를 허용해주세요.';
                    }
                }
            );
        });

        stopBtn.addEventListener('click', () => {
            if (!_pendingReset) {
                // 1차 클릭: 측정 정지 — 그래프 유지
                SensorModule.stop();
                _pendingReset       = true;
                stopBtn.textContent = '초기화';
                stopBtn.className   = 'btn btn--ghost btn--lg';
                startBtn.hidden     = false;
                statusMsg.textContent = '측정 정지됨. 초기화하려면 초기화 버튼을 누르세요.';
            } else {
                // 2차 클릭: 초기화 — 그래프 리셋
                if (typeof VisualModule !== 'undefined') VisualModule.reset();
                stopBtn.hidden  = true;
                startBtn.hidden = false;
                _resetStopBtn();
                statusMsg.textContent = '버튼을 눌러 센서 권한을 요청하세요.';
            }
        });
    </script>

</body>
</html>
