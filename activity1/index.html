<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지진파 색으로 보기</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="activity-page" id="activity-body">

    <header class="activity-header">
        <a href="../" class="btn btn--ghost btn--sm">← 목록</a>
        <h1>지진파 색으로 보기</h1>
    </header>

    <main class="activity-main">

        <!-- 배경색 시각화 영역 -->
        <div class="color-display" id="color-display">
            <p class="color-display__mmi" id="mmi-level-text"></p>
            <p class="color-display__label" id="magnitude-label">0.000000</p>
            <p class="color-display__unit">m/s²</p>
        </div>

        <!-- 파형 그래프 -->
        <div class="chart-wrapper">
            <canvas id="waveChart"></canvas>
        </div>

        <!-- 리뷰 모드 컨트롤 바 (측정 정지 후 표시) -->
        <div class="review-bar" id="review-bar" hidden>
            <span class="review-bar__mmi" id="review-mmi-label"></span>
        </div>

        <!-- 토글 스위치 (측정 ready + 리뷰 모드에서 표시) -->
        <label class="mmi-toggle" id="lock-toggle" hidden>
            <span class="mmi-toggle__label">실시간</span>
            <input type="checkbox" id="lock-checkbox">
            <span class="mmi-toggle__track"><span class="mmi-toggle__thumb"></span></span>
            <span class="mmi-toggle__label">고정</span>
        </label>

        <!-- 컨트롤 -->
        <div class="controls">
            <button class="btn btn--primary btn--lg" id="start-btn">측정 시작</button>
            <button class="btn btn--danger btn--lg"  id="stop-btn"  hidden>측정 정지</button>
        </div>

        <!-- 상태 메시지 -->
        <p class="status-msg" id="status-msg">버튼을 눌러 센서 권한을 요청하세요.</p>

        <!-- 진도 안내 버튼 -->
        <button class="btn btn--sm mmi-info-btn" id="mmi-info-btn">진도 안내</button>

    </main>

    <!-- MMI 진도 안내 모달 -->
    <div class="modal" id="mmi-modal" hidden>
        <div class="modal__box modal__box--wide">
            <h3>수정 메르칼리 진도 (KMA)</h3>
            <table class="mmi-table" id="mmi-table"></table>
            <button class="btn btn--ghost" id="mmi-close-btn">닫기</button>
        </div>
    </div>

    <script src="../assets/js/sensor.js?v=4.2"></script>
    <script src="../assets/js/visual.js?v=4.3"></script>
    <script src="../assets/js/review.js?v=4.4"></script>

    <script>
        const startBtn     = document.getElementById('start-btn');
        const stopBtn      = document.getElementById('stop-btn');
        const lockToggle   = document.getElementById('lock-toggle');
        const lockCheckbox = document.getElementById('lock-checkbox');
        const statusMsg    = document.getElementById('status-msg');
        const reviewBar    = document.getElementById('review-bar');
        const colorDisplay = document.getElementById('color-display');
        const mmiLevelText = document.getElementById('mmi-level-text');
        const mmiInfoBtn      = document.getElementById('mmi-info-btn');
        const mmiModal        = document.getElementById('mmi-modal');
        const mmiCloseBtn     = document.getElementById('mmi-close-btn');
        const mmiTable        = document.getElementById('mmi-table');
        const bodyEl          = document.getElementById('activity-body');
        const magnitudeLabel  = document.getElementById('magnitude-label');

        // ── MMI 진도 안내 모달 ──────────────────────────────────────
        let _mmiTableBuilt = false;
        mmiInfoBtn.addEventListener('click', () => {
            if (!_mmiTableBuilt) {
                VisualModule.getMmiLevels().forEach(m => {
                    const tr = document.createElement('tr');
                    const pgaStr = m.pgaMax === Infinity
                        ? `≥ ${m.pgaMin} m/s²`
                        : `${m.pgaMin} ~ ${m.pgaMax} m/s²`;
                    tr.innerHTML = `
                        <td style="background:${m.color};width:10px;border-radius:2px;"></td>
                        <td>${m.level}</td>
                        <td>${m.name}</td>
                        <td>${pgaStr}</td>`;
                    mmiTable.appendChild(tr);
                });
                _mmiTableBuilt = true;
            }
            mmiModal.hidden = false;
        });
        mmiCloseBtn.addEventListener('click', () => { mmiModal.hidden = true; });
        mmiModal.addEventListener('click', (e) => { if (e.target === mmiModal) mmiModal.hidden = true; });

        // ── 토글 스위치 ────────────────────────────────────────────
        let _lockActive   = false;
        let _reviewPeakZ  = 0;

        lockCheckbox.addEventListener('change', () => {
            _lockActive = lockCheckbox.checked;

            if (!_inReview) {
                // 라이브 모드: VisualModule 색 고정/해제
                VisualModule.setColorLock(_lockActive);
            } else {
                // 리뷰 모드: 고정 해제 시 reviewPeak 초기화
                if (!_lockActive) _reviewPeakZ = 0;
            }
        });

        // ── 측정 제어 ──────────────────────────────────────────────
        let _pendingReset = false;
        let _inReview     = false;

        function _resetStopBtn() {
            stopBtn.textContent = '측정 정지';
            stopBtn.className   = 'btn btn--danger btn--lg';
            _pendingReset       = false;
        }

        function _resetToggle() {
            lockCheckbox.checked = false;
            _lockActive          = false;
            lockToggle.hidden    = true;
        }

        startBtn.addEventListener('click', () => {
            if (_inReview) {
                ReviewModule.destroy();
                _inReview = false;
            }
            VisualModule.reset();
            reviewBar.hidden = true;
            _reviewPeakZ     = 0;

            startBtn.hidden = true;
            stopBtn.hidden  = true;
            _resetStopBtn();
            _resetToggle();
            statusMsg.textContent = '측정 중...';

            SensorModule.start(
                (data) => { VisualModule.update(data); },
                (msg)  => {
                    statusMsg.textContent = '오류: ' + msg;
                    stopBtn.hidden  = true;
                    startBtn.hidden = false;
                    _resetStopBtn();
                },
                (state, arg1, arg2) => {
                    if (state === 'warmup') {
                        statusMsg.textContent = `측정 준비 중... (${arg1}초 후 시작)`;
                    } else if (state === 'calibrating') {
                        statusMsg.textContent = `기준값 설정 중... (${arg1}/${arg2})`;
                    } else if (state === 'ready') {
                        const isFirefox = navigator.userAgent.includes('Firefox');
                        const srcLabel  = arg1 === 'linear'       ? ' (LinearAccelerationSensor — 최고정밀)'
                                        : arg1 === 'accel'        ? ' (Accelerometer — 고정밀)'
                                        : arg1 === 'devicemotion' ? (isFirefox ? ' (DeviceMotionEvent — 고정밀)' : ' (DeviceMotionEvent — Chrome 정밀도 제한, Android는 Firefox 권장)')
                                        : '';
                        statusMsg.textContent = '측정 중' + srcLabel + ' — 시작 시점 대비 변화량을 표시합니다.';
                        stopBtn.hidden     = false;
                        lockToggle.hidden  = false;
                    } else if (state === 'unavailable') {
                        statusMsg.textContent = '⚠️ 이 기기에서 센서 데이터를 읽을 수 없습니다. Android의 경우 Firefox를 사용하거나, Chrome 설정 > 사이트 설정 > 동작 센서를 허용해주세요.';
                    }
                }
            );
        });

        stopBtn.addEventListener('click', () => {
            if (!_pendingReset) {
                // 1차 클릭: 측정 정지 → 리뷰 모드 진입
                SensorModule.stop();
                _pendingReset = true;
                stopBtn.textContent = '초기화';
                stopBtn.className   = 'btn btn--ghost btn--lg';
                startBtn.hidden     = false;
                _reviewPeakZ        = 0;
                VisualModule.setColorLock(false);

                const snapshot = VisualModule.startReview();
                if (snapshot.length >= 2) {
                    _inReview        = true;
                    reviewBar.hidden = false;
                    lockToggle.hidden = false;  // 리뷰 모드에서도 스위치 유지

                    ReviewModule.init(
                        document.getElementById('waveChart'),
                        snapshot,
                        (maxZ, level, name) => {
                            if (_lockActive) {
                                // 고정 모드: 최대 진도만 갱신
                                if (maxZ > _reviewPeakZ) {
                                    _reviewPeakZ = maxZ;
                                    mmiLevelText.textContent           = `진도 ${level} ${name}`;
                                    magnitudeLabel.textContent         = maxZ.toFixed(6);
                                    bodyEl.style.backgroundColor       = VisualModule.getMmiColor(maxZ);
                                    colorDisplay.style.backgroundColor = '';
                                }
                            } else {
                                // 실시간 모드: 현재 구간 진도 표시
                                mmiLevelText.textContent           = `진도 ${level} ${name}`;
                                magnitudeLabel.textContent         = maxZ.toFixed(6);
                                bodyEl.style.backgroundColor       = VisualModule.getMmiColor(maxZ);
                                colorDisplay.style.backgroundColor = '';
                            }
                        }
                    );
                    statusMsg.textContent = '측정 정지됨. 그래프를 드래그하여 구간별 진도를 확인하세요.';
                } else {
                    lockToggle.hidden = true;
                    statusMsg.textContent = '측정 정지됨. 초기화하려면 초기화 버튼을 누르세요.';
                }
            } else {
                // 2차 클릭: 초기화
                if (_inReview) {
                    ReviewModule.destroy();
                    _inReview = false;
                }
                VisualModule.reset();
                reviewBar.hidden = true;
                stopBtn.hidden   = true;
                startBtn.hidden  = false;
                _resetStopBtn();
                _resetToggle();
                statusMsg.textContent = '버튼을 눌러 센서 권한을 요청하세요.';
            }
        });
    </script>

</body>
</html>
