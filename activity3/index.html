<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주파수 분석</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="activity-page" id="activity-body">

    <header class="activity-header">
        <a href="../" class="btn btn--ghost btn--sm">← 목록</a>
        <h1>주파수 분석</h1>
    </header>

    <!-- 상위 모드 탭 (센서 / 파일) -->
    <div class="mode-tabs">
        <button class="mode-tabs__btn mode-tabs__btn--active" id="tab-sensor">센서 측정</button>
        <button class="mode-tabs__btn" id="tab-file">파일 선택</button>
    </div>

    <main class="activity-main" style="justify-content: flex-start; gap: 10px; padding-top: 10px;">

        <!-- ── 센서 모드 패널 ──────────────────────────────── -->
        <div id="panel-sensor">

            <!-- 파형 그래프 -->
            <div class="chart-wrapper" style="height: 20vh; max-height: 150px;">
                <canvas id="waveChart"></canvas>
            </div>

            <!-- 분석 탭 -->
            <div class="analysis-tabs" id="sensor-analysis-tabs">
                <button class="analysis-tabs__btn analysis-tabs__btn--active" data-analysis="spectro">스펙트로그램</button>
                <button class="analysis-tabs__btn" data-analysis="psd">PSD</button>
                <button class="analysis-tabs__btn" data-analysis="hvsr">HVSR</button>
            </div>

            <!-- 분석 캔버스 -->
            <div class="spectrogram-panel" id="sensor-spectro-panel">
                <canvas id="spectroChart"></canvas>
            </div>
            <div class="spectrogram-panel" id="sensor-psd-panel" hidden>
                <canvas id="psdChart"></canvas>
            </div>
            <div class="spectrogram-panel" id="sensor-hvsr-panel" hidden>
                <canvas id="hvsrChart"></canvas>
            </div>

            <!-- 피크 주파수 (스펙트로그램 탭 전용) -->
            <div class="peak-freq-display" id="peak-freq-display" hidden>
                주요 주파수: <span id="peak-freq-val">—</span> Hz
            </div>

            <div class="controls">
                <button class="btn btn--primary btn--lg" id="sensor-start-btn">측정 시작</button>
                <button class="btn btn--danger btn--lg" id="sensor-stop-btn" hidden>측정 정지</button>
                <button class="btn btn--ghost btn--lg" id="sensor-reset-btn" hidden>초기화</button>
            </div>
            <p class="status-msg" id="sensor-status">버튼을 눌러 센서 권한을 요청하세요.</p>

        </div>

        <!-- ── 파일 모드 패널 ──────────────────────────────── -->
        <div id="panel-file" hidden>

            <!-- 드롭존 -->
            <div class="drop-zone" id="drop-zone">
                <p class="drop-zone__text">CSV 파일을 여기에 드래그하거나</p>
                <label class="btn btn--primary" for="file-input">파일 선택</label>
                <input type="file" id="file-input" accept=".csv" style="display:none;">
            </div>

            <!-- 파일 정보 (로드 후) -->
            <div class="csv-file-info" id="csv-file-info" hidden>
                <span id="csv-filename">—</span>
                <span id="csv-duration">—</span>
                <span id="csv-sr">—</span>
            </div>

            <!-- 파형 캔버스 (파일 모드, 분석 완료 후 표시) -->
            <div class="chart-wrapper" style="height:15vh;max-height:120px;" id="file-wave-wrapper" hidden>
                <canvas id="fileWaveChart"></canvas>
            </div>

            <!-- 분석 탭 (파일) -->
            <div class="analysis-tabs" id="file-analysis-tabs" hidden>
                <button class="analysis-tabs__btn analysis-tabs__btn--active" data-analysis="spectro">스펙트로그램</button>
                <button class="analysis-tabs__btn" data-analysis="psd">PSD</button>
                <button class="analysis-tabs__btn" data-analysis="hvsr" id="file-hvsr-tab">HVSR</button>
            </div>

            <!-- 분석 캔버스 (파일) -->
            <div class="spectrogram-panel" id="file-spectro-panel" hidden>
                <canvas id="fileSpectroChart"></canvas>
            </div>
            <div class="spectrogram-panel" id="file-psd-panel" hidden>
                <canvas id="filePsdChart"></canvas>
            </div>
            <div class="spectrogram-panel" id="file-hvsr-panel" hidden>
                <canvas id="fileHvsrChart"></canvas>
            </div>

            <div class="controls" id="file-controls" hidden>
                <button class="btn btn--primary btn--lg" id="file-play-btn">분석 시작</button>
                <button class="btn btn--ghost btn--lg" id="file-reset-btn" hidden>초기화</button>
            </div>
            <p class="status-msg" id="file-status">CSV 파일을 선택하면 주파수 분석을 시작합니다.</p>

        </div>

    </main>

    <script src="../assets/js/sensor.js"></script>
    <script src="../assets/js/visual.js?v=4.9"></script>
    <script src="../assets/js/spectrogram.js?v=3.0"></script>
    <script src="../assets/js/psd.js?v=2.2"></script>
    <script src="../assets/js/hvsr.js?v=1.2"></script>

    <script>
        // ── Constants ────────────────────────────────────────────────
        const WINDOW_SEC  = 30;   // must match spectrogram.js
        const HOP_SIZE    = 26;   // must match spectrogram.js
        const FREQ_AXIS_W = 30;   // must match spectrogram.js

        let _sr = 100;

        let _waveRows   = null;  // 파형 그리기용 CSV rows (분석 완료 후 설정)
        let _waveSr     = 100;
        let _waveCanvas = null;
        let _waveLastX  = 0;

        // ── CSV parser ───────────────────────────────────────────────
        function parseCSV(text) {
            const meta = {}, rows = [];
            let keys = null;
            for (const raw of text.split('\n')) {
                const line = raw.trim();
                if (!line) continue;
                if (line.startsWith('#')) {
                    const m = line.slice(1).trim().match(/^(\w+)\s*:\s*(.+)$/);
                    if (m) meta[m[1]] = m[2].trim();
                } else if (!keys) {
                    keys = line.split(',');
                } else {
                    const vals = line.split(',');
                    if (vals.length < keys.length) continue;
                    const row = {};
                    keys.forEach((k, i) => { row[k] = vals[i]; });
                    rows.push(row);
                }
            }
            let sr = meta.sample_rate ? parseInt(meta.sample_rate) : null;
            if (!sr && rows.length >= 2) {
                const dt = new Date(rows[1].timestamp) - new Date(rows[0].timestamp);
                if (dt > 0) sr = Math.round(1000 / dt);
            }
            return { meta, rows, sr: sr || 100 };
        }

        function fmtTime(sec) {
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        // ── Lazy canvas init: show panel briefly to get correct clientWidth ──
        function initCanvas(canvasEl, module, ...args) {
            const panel = canvasEl.parentElement;
            const wasHidden = panel.hidden;
            if (wasHidden) panel.hidden = false;
            module.init(canvasEl, ...args);
            if (wasHidden) panel.hidden = true;
        }

        // ═════════════════════════════════════════════════════════════
        // SENSOR MODE
        // ═════════════════════════════════════════════════════════════
        const sensorStartBtn  = document.getElementById('sensor-start-btn');
        const sensorStopBtn   = document.getElementById('sensor-stop-btn');
        const sensorResetBtn  = document.getElementById('sensor-reset-btn');
        const sensorStatus    = document.getElementById('sensor-status');
        const peakFreqDisplay = document.getElementById('peak-freq-display');
        const peakFreqVal     = document.getElementById('peak-freq-val');

        let _sensorInited    = false;
        let _sensorActiveTab = 'spectro';

        // ── Sensor analysis tab switching ─────────────────────────────
        document.getElementById('sensor-analysis-tabs').querySelectorAll('.analysis-tabs__btn')
            .forEach(btn => btn.addEventListener('click', () => {
                _sensorActiveTab = btn.dataset.analysis;
                document.getElementById('sensor-analysis-tabs').querySelectorAll('.analysis-tabs__btn')
                    .forEach(b => b.classList.toggle('analysis-tabs__btn--active', b === btn));
                document.getElementById('sensor-spectro-panel').hidden = _sensorActiveTab !== 'spectro';
                document.getElementById('sensor-psd-panel').hidden     = _sensorActiveTab !== 'psd';
                document.getElementById('sensor-hvsr-panel').hidden    = _sensorActiveTab !== 'hvsr';
                peakFreqDisplay.hidden = _sensorActiveTab !== 'spectro';
            }));

        // ── Review mode (horizontal pan/pinch) ───────────────────────
        const _reviewPointers = new Map();
        let _reviewOffset    = 0;
        let _reviewCols      = 0;
        let _reviewTotal     = 0;
        let _reviewLastX     = 0;
        let _pinchDist       = 0;
        let _pinchStartCols  = 0;
        let _pinchAnchorFrac = 0;
        let _pinchAnchorOff  = 0;
        let _reviewCanvas    = null;

        // ── File mode waveform ────────────────────────────────────────
        function _drawFileWave(startIdx, winSamples) {
            const canvas = document.getElementById('fileWaveChart');
            if (!canvas || !_waveRows || winSamples <= 0) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const PAD_L = 36, PAD_R = 8, PAD_T = 6, PAD_B = 16;
            const PW = W - PAD_L - PAD_R, PH = H - PAD_T - PAD_B;
            const s0 = Math.max(0, startIdx);
            const s1 = Math.min(_waveRows.length, s0 + winSamples);

            ctx.fillStyle = '#1c1c1c';
            ctx.fillRect(0, 0, W, H);

            let maxAbs = 0;
            for (let i = s0; i < s1; i++)
                maxAbs = Math.max(maxAbs, Math.abs(parseFloat(_waveRows[i].acc_z) || 0));
            maxAbs = Math.max(maxAbs, 0.001);
            const yScale = (PH / 2) / maxAbs;
            const midY = PAD_T + PH / 2;

            ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(PAD_L, midY); ctx.lineTo(PAD_L + PW, midY); ctx.stroke();

            ctx.fillStyle = '#555'; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
            ctx.fillText(`±${maxAbs.toFixed(3)}`, PAD_L - 2, PAD_T + 9);

            ctx.strokeStyle = '#00d2d3'; ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = s0; i < s1; i++) {
                const v  = parseFloat(_waveRows[i].acc_z) || 0;
                const px = PAD_L + (i - s0) / (s1 - s0) * PW;
                const py = midY - v * yScale;
                i === s0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke();

            ctx.fillStyle = '#555'; ctx.textAlign = 'center';
            const startSec = s0 / _waveSr, endSec = s1 / _waveSr, durSec = endSec - startSec;
            const step = durSec <= 5 ? 1 : durSec <= 30 ? 5 : durSec <= 120 ? 10 : 30;
            for (let t = Math.ceil(startSec / step) * step; t <= endSec; t += step) {
                const px = PAD_L + (t - startSec) / durSec * PW;
                ctx.fillText(`${t}s`, Math.max(PAD_L + 12, Math.min(px, W - 12)), H - 2);
            }
        }

        function _syncWave() {
            if (!_waveRows || !_reviewTotal) return;
            const N = _reviewTotal;
            const startSample = Math.max(0, (N - _reviewOffset - _reviewCols) * HOP_SIZE);
            const winSamples  = Math.max(1, _reviewCols * HOP_SIZE);
            _drawFileWave(startSample, winSamples);
        }

        function _onWaveDown(e) {
            e.preventDefault();
            _waveCanvas.setPointerCapture(e.pointerId);
            _reviewPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (_reviewPointers.size === 1) {
                _reviewLastX = e.clientX;
            } else if (_reviewPointers.size === 2) {
                const pts = [..._reviewPointers.values()];
                _pinchDist       = Math.abs(pts[0].x - pts[1].x);
                _pinchStartCols  = _reviewCols;
                const SW  = _waveCanvas.clientWidth;
                const midX = (Math.min(pts[0].x, pts[1].x) + _pinchDist / 2
                              - _waveCanvas.getBoundingClientRect().left);
                _pinchAnchorFrac = Math.max(0, Math.min(1, midX / Math.max(1, SW)));
                _pinchAnchorOff  = _reviewOffset + (1 - _pinchAnchorFrac) * _reviewCols;
            }
        }
        function _onWaveMove(e) {
            e.preventDefault();
            _reviewPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            const SW = _waveCanvas.clientWidth;
            if (_reviewPointers.size === 1) {
                const dx = e.clientX - _reviewLastX;
                _reviewLastX = e.clientX;
                const deltaCols = dx * _reviewCols / Math.max(1, SW);
                const { o, c } = _reviewClamp(_reviewOffset + deltaCols, _reviewCols);
                _reviewOffset = o; _reviewCols = c;
                SpectrogramModule.setView(_reviewOffset, _reviewCols);
                _syncWave();
            } else if (_reviewPointers.size === 2) {
                const pts = [..._reviewPointers.values()];
                const dist = Math.abs(pts[0].x - pts[1].x);
                if (dist < 2) return;
                const scale   = _pinchDist / dist;
                const newCols = Math.round(_pinchStartCols * scale);
                const { o, c } = _reviewClamp(
                    Math.round(_pinchAnchorOff - (1 - _pinchAnchorFrac) * newCols),
                    newCols
                );
                _reviewOffset = o; _reviewCols = c;
                SpectrogramModule.setView(_reviewOffset, _reviewCols);
                _syncWave();
            }
        }
        function _onWaveUp(e) {
            _reviewPointers.delete(e.pointerId);
            if (_reviewPointers.size === 1) {
                const [ptr] = _reviewPointers.values();
                _reviewLastX = ptr.x;
            }
        }

        function _attachWaveEvents() {
            _waveCanvas = document.getElementById('fileWaveChart');
            _waveCanvas.style.touchAction = 'none';
            _waveCanvas.addEventListener('pointerdown',   _onWaveDown);
            _waveCanvas.addEventListener('pointermove',   _onWaveMove);
            _waveCanvas.addEventListener('pointerup',     _onWaveUp);
            _waveCanvas.addEventListener('pointercancel', _onWaveUp);
        }
        function _detachWaveEvents() {
            if (!_waveCanvas) return;
            _waveCanvas.style.touchAction = '';
            _waveCanvas.removeEventListener('pointerdown',   _onWaveDown);
            _waveCanvas.removeEventListener('pointermove',   _onWaveMove);
            _waveCanvas.removeEventListener('pointerup',     _onWaveUp);
            _waveCanvas.removeEventListener('pointercancel', _onWaveUp);
            _reviewPointers.clear();
            _waveCanvas = null;
        }

        function _reviewClamp(offset, cols) {
            const N = _reviewTotal;
            const c = Math.max(1, Math.min(Math.round(cols), N));
            const o = Math.max(0, Math.min(Math.round(offset), N - c));
            return { o, c };
        }

        function _onReviewDown(e) {
            e.preventDefault();
            const canvas = _reviewCanvas;
            canvas.setPointerCapture(e.pointerId);
            _reviewPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (_reviewPointers.size === 1) {
                _reviewLastX = e.clientX;
            } else if (_reviewPointers.size === 2) {
                const pts = [..._reviewPointers.values()];
                _pinchDist      = Math.abs(pts[0].x - pts[1].x);
                _pinchStartCols = _reviewCols;
                const SW = canvas.clientWidth - FREQ_AXIS_W;
                const midX = (Math.min(pts[0].x, pts[1].x) + _pinchDist / 2
                              - canvas.getBoundingClientRect().left - FREQ_AXIS_W);
                _pinchAnchorFrac = Math.max(0, Math.min(1, midX / Math.max(1, SW)));
                // anchor: col index fixed under midpoint (right side = newer = lower index)
                _pinchAnchorOff  = _reviewOffset + (1 - _pinchAnchorFrac) * _reviewCols;
            }
        }

        function _onReviewMove(e) {
            e.preventDefault();
            _reviewPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            const canvas = _reviewCanvas;
            const SW = canvas.clientWidth - FREQ_AXIS_W;

            if (_reviewPointers.size === 1) {
                const dx = e.clientX - _reviewLastX;
                _reviewLastX = e.clientX;
                // drag right → older data (content-grab model)
                const deltaCols = dx * _reviewCols / Math.max(1, SW);
                const { o, c } = _reviewClamp(_reviewOffset + deltaCols, _reviewCols);
                _reviewOffset = o; _reviewCols = c;
                SpectrogramModule.setView(_reviewOffset, _reviewCols);
                _syncWave();
            } else if (_reviewPointers.size === 2) {
                const pts = [..._reviewPointers.values()];
                const dist = Math.abs(pts[0].x - pts[1].x);
                if (dist < 2) return;
                const scale   = _pinchDist / dist;
                const newCols = Math.round(_pinchStartCols * scale);
                const { o, c } = _reviewClamp(
                    Math.round(_pinchAnchorOff - (1 - _pinchAnchorFrac) * newCols),
                    newCols
                );
                _reviewOffset = o; _reviewCols = c;
                SpectrogramModule.setView(_reviewOffset, _reviewCols);
                _syncWave();
            }
        }

        function _onReviewUp(e) {
            _reviewPointers.delete(e.pointerId);
            if (_reviewPointers.size === 1) {
                const [ptr] = _reviewPointers.values();
                _reviewLastX = ptr.x;
            }
        }

        function _attachReviewEvents(canvas) {
            _reviewCanvas = canvas;
            canvas.style.touchAction = 'none';
            canvas.addEventListener('pointerdown',   _onReviewDown);
            canvas.addEventListener('pointermove',   _onReviewMove);
            canvas.addEventListener('pointerup',     _onReviewUp);
            canvas.addEventListener('pointercancel', _onReviewUp);
        }

        function _detachReviewEvents() {
            if (!_reviewCanvas) return;
            _reviewCanvas.style.touchAction = '';
            _reviewCanvas.removeEventListener('pointerdown',   _onReviewDown);
            _reviewCanvas.removeEventListener('pointermove',   _onReviewMove);
            _reviewCanvas.removeEventListener('pointerup',     _onReviewUp);
            _reviewCanvas.removeEventListener('pointercancel', _onReviewUp);
            _reviewPointers.clear();
            _reviewCanvas = null;
        }

        // ── Sensor start ──────────────────────────────────────────────
        sensorStartBtn.addEventListener('click', () => {
            sensorStartBtn.hidden = true;
            sensorStopBtn.hidden  = true;
            sensorResetBtn.hidden = true;
            sensorStatus.textContent = '센서 권한 요청 중...';

            SensorModule.start(
                (data) => {
                    if (data.interval_ms > 0) {
                        const sr = Math.round(1000 / data.interval_ms);
                        if (sr >= 50 && sr <= 250) _sr = sr;
                    }
                    VisualModule.update(data);
                    SpectrogramModule.push(data.acc_z, _sr);
                    PsdModule.push(data.acc_z, _sr);
                    HvsrModule.push(data.acc_x, data.acc_y, data.acc_z, _sr);
                },
                (msg) => {
                    sensorStatus.textContent = '오류: ' + msg;
                    sensorStartBtn.hidden = false;
                },
                (state, arg1, arg2) => {
                    if (state === 'warmup') {
                        sensorStatus.textContent = `측정 준비 중... (${arg1}초 후 시작)`;
                    } else if (state === 'calibrating') {
                        sensorStatus.textContent = `기준값 설정 중... (${arg1}/${arg2})`;
                    } else if (state === 'ready') {
                        if (!_sensorInited) {
                            _sensorInited = true;
                            // Init all 3 analysis canvases (hidden ones shown briefly for clientWidth)
                            initCanvas(document.getElementById('spectroChart'), SpectrogramModule, _sr,
                                (hz) => {
                                    if (_sensorActiveTab === 'spectro') {
                                        peakFreqDisplay.hidden = false;
                                        peakFreqVal.textContent = hz;
                                    }
                                });
                            initCanvas(document.getElementById('psdChart'),   PsdModule,  _sr);
                            initCanvas(document.getElementById('hvsrChart'),  HvsrModule, _sr);
                        }
                        const isFirefox = navigator.userAgent.includes('Firefox');
                        const srcLabel =
                            arg1 === 'linear'       ? ' (LinearAccelerationSensor)' :
                            arg1 === 'accel'        ? ' (Accelerometer)' :
                            arg1 === 'devicemotion' ? (isFirefox
                                ? ' (DeviceMotionEvent)'
                                : ' (DeviceMotionEvent — Android는 Firefox 권장)') : '';
                        sensorStatus.textContent = '측정 중' + srcLabel;
                        sensorStopBtn.hidden = false;
                    } else if (state === 'unavailable') {
                        sensorStatus.textContent = '⚠️ 센서를 사용할 수 없습니다. Firefox 사용 또는 센서 권한을 확인하세요.';
                    }
                }
            );
        });

        // ── Sensor stop → review mode ─────────────────────────────────
        sensorStopBtn.addEventListener('click', () => {
            SensorModule.stop();
            sensorStopBtn.hidden  = true;
            sensorResetBtn.hidden = false;
            sensorStartBtn.hidden = false;

            _reviewTotal  = SpectrogramModule.historyLength();
            _reviewCols   = Math.min(_reviewTotal, Math.ceil(_sr * WINDOW_SEC / HOP_SIZE));
            _reviewOffset = 0;
            SpectrogramModule.startReview();
            _attachReviewEvents(document.getElementById('spectroChart'));

            sensorStatus.textContent = '측정 정지됨. 스펙트로그램 탭에서 드래그·핀치로 탐색 가능합니다.';
        });

        // ── Sensor reset ──────────────────────────────────────────────
        sensorResetBtn.addEventListener('click', () => {
            _detachReviewEvents();
            SpectrogramModule.reset();
            PsdModule.reset();
            HvsrModule.reset();
            VisualModule.reset();
            _sensorInited = false;
            peakFreqDisplay.hidden = true;
            peakFreqVal.textContent = '—';
            sensorResetBtn.hidden = true;
            _reviewTotal = 0; _reviewCols = 0; _reviewOffset = 0;
            sensorStatus.textContent = '버튼을 눌러 센서 권한을 요청하세요.';
        });

        // ═════════════════════════════════════════════════════════════
        // FILE MODE
        // ═════════════════════════════════════════════════════════════
        const dropZone         = document.getElementById('drop-zone');
        const fileInput        = document.getElementById('file-input');
        const csvFileInfo      = document.getElementById('csv-file-info');
        const fileAnalysisTabs = document.getElementById('file-analysis-tabs');
        const fileControls     = document.getElementById('file-controls');
        const filePlayBtn      = document.getElementById('file-play-btn');
        const fileResetBtn     = document.getElementById('file-reset-btn');
        const fileStatus       = document.getElementById('file-status');
        const csvFilename      = document.getElementById('csv-filename');
        const csvDuration      = document.getElementById('csv-duration');
        const csvSr            = document.getElementById('csv-sr');
        const fileHvsrTab      = document.getElementById('file-hvsr-tab');

        let _csvRows       = null;
        let _csvSr         = 100;
        let _fileHas3axis  = false;
        let _fileActiveTab = 'spectro';

        // ── File analysis tab switching ───────────────────────────────
        fileAnalysisTabs.querySelectorAll('.analysis-tabs__btn')
            .forEach(btn => btn.addEventListener('click', () => {
                _fileActiveTab = btn.dataset.analysis;
                fileAnalysisTabs.querySelectorAll('.analysis-tabs__btn')
                    .forEach(b => b.classList.toggle('analysis-tabs__btn--active', b === btn));
                document.getElementById('file-spectro-panel').hidden = _fileActiveTab !== 'spectro';
                document.getElementById('file-psd-panel').hidden     = _fileActiveTab !== 'psd';
                document.getElementById('file-hvsr-panel').hidden    = _fileActiveTab !== 'hvsr';
            }));

        // ── Drag and drop ─────────────────────────────────────────────
        dropZone.addEventListener('dragover',  (e) => { e.preventDefault(); dropZone.classList.add('drop-zone--hover'); });
        dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drop-zone--hover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--hover');
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); });

        function loadFile(file) {
            fileStatus.textContent = '파일 읽는 중...';
            const reader = new FileReader();
            reader.onload = (e) => {
                const { meta, rows, sr } = parseCSV(e.target.result);
                if (rows.length === 0) {
                    fileStatus.textContent = '⚠️ 데이터가 없거나 형식이 맞지 않습니다.';
                    return;
                }
                _csvRows = rows; _csvSr = sr;
                _fileHas3axis = !!(rows[0] && rows[0].acc_x !== undefined);
                _fileActiveTab = 'spectro';

                // Reset tab selection
                fileAnalysisTabs.querySelectorAll('.analysis-tabs__btn').forEach(b => {
                    b.classList.toggle('analysis-tabs__btn--active', b.dataset.analysis === 'spectro');
                });
                fileHvsrTab.disabled = !_fileHas3axis;

                const durSec = rows.length / sr;
                csvFilename.textContent = file.name;
                csvDuration.textContent = `${fmtTime(durSec)} (${rows.length.toLocaleString()}샘플)`;
                csvSr.textContent       = `${sr} Hz`;

                dropZone.hidden          = true;
                csvFileInfo.hidden       = false;
                fileAnalysisTabs.hidden  = false;
                document.getElementById('file-spectro-panel').hidden = false;
                document.getElementById('file-psd-panel').hidden     = true;
                document.getElementById('file-hvsr-panel').hidden    = true;
                fileControls.hidden = false;
                filePlayBtn.hidden  = false;
                fileResetBtn.hidden = true;

                fileStatus.textContent = _fileHas3axis
                    ? '3축 CSV 감지 — 스펙트로그램·PSD·HVSR 모두 분석 가능합니다.'
                    : '분석 시작 버튼을 눌러 결과를 생성합니다.';
            };
            reader.readAsText(file);
        }

        // ── File play ─────────────────────────────────────────────────
        filePlayBtn.addEventListener('click', () => {
            if (!_csvRows) return;
            filePlayBtn.hidden  = true;
            fileResetBtn.hidden = true;
            fileStatus.textContent = '분석 중...';

            setTimeout(() => {
                const rows = _csvRows, sr = _csvSr;

                // Spectrogram: push all acc_z rows
                SpectrogramModule.reset();
                initCanvas(document.getElementById('fileSpectroChart'), SpectrogramModule, sr, null);
                for (const row of rows)
                    SpectrogramModule.push(parseFloat(row.acc_z) || 0, sr);
                SpectrogramModule.startReview();
                _reviewTotal  = SpectrogramModule.historyLength();
                _reviewCols   = _reviewTotal;
                _reviewOffset = 0;

                // PSD: Welch average from all rows
                PsdModule.reset();
                initCanvas(document.getElementById('filePsdChart'), PsdModule, sr);
                PsdModule.computeFromRows(rows, sr, 'z');

                // HVSR: Nakamura method (3축 CSV만)
                if (_fileHas3axis) {
                    HvsrModule.reset();
                    initCanvas(document.getElementById('fileHvsrChart'), HvsrModule, sr);
                    HvsrModule.computeFromRows(rows, sr);
                }

                // 파형 캔버스 초기화 및 표시
                _waveRows = rows; _waveSr = sr;
                const fileWaveWrapper = document.getElementById('file-wave-wrapper');
                const fileWaveCanvas  = document.getElementById('fileWaveChart');
                fileWaveWrapper.hidden = false;
                fileWaveCanvas.width  = fileWaveCanvas.clientWidth  || 300;
                fileWaveCanvas.height = fileWaveCanvas.clientHeight || 120;
                _drawFileWave(0, rows.length);
                _attachWaveEvents();

                fileStatus.textContent = '분석 완료. 탭을 눌러 결과를 확인하세요.';
                fileResetBtn.hidden = false;
            }, 30);
        });

        // ── File reset ────────────────────────────────────────────────
        fileResetBtn.addEventListener('click', () => {
            _detachReviewEvents();
            _detachWaveEvents();
            document.getElementById('file-wave-wrapper').hidden = true;
            _waveRows = null;
            _csvRows = null; _fileHas3axis = false; _fileActiveTab = 'spectro';
            SpectrogramModule.reset();
            PsdModule.reset();
            HvsrModule.reset();

            dropZone.hidden         = false;
            csvFileInfo.hidden      = true;
            fileAnalysisTabs.hidden = true;
            document.getElementById('file-spectro-panel').hidden = true;
            document.getElementById('file-psd-panel').hidden     = true;
            document.getElementById('file-hvsr-panel').hidden    = true;
            fileControls.hidden     = true;
            fileInput.value         = '';
            fileHvsrTab.disabled    = false;

            fileStatus.textContent = 'CSV 파일을 선택하면 주파수 분석을 시작합니다.';
        });

        // ═════════════════════════════════════════════════════════════
        // MAIN TAB SWITCHING
        // ═════════════════════════════════════════════════════════════
        const tabSensor   = document.getElementById('tab-sensor');
        const tabFile     = document.getElementById('tab-file');
        const panelSensor = document.getElementById('panel-sensor');
        const panelFile   = document.getElementById('panel-file');

        function switchTab(mode) {
            if (mode === 'sensor') {
                _detachReviewEvents();  // 파일 모드 리뷰 이벤트 정리
                tabSensor.classList.add('mode-tabs__btn--active');
                tabFile.classList.remove('mode-tabs__btn--active');
                panelSensor.hidden = false;
                panelFile.hidden   = true;
            } else {
                tabFile.classList.add('mode-tabs__btn--active');
                tabSensor.classList.remove('mode-tabs__btn--active');
                panelFile.hidden   = false;
                panelSensor.hidden = true;
                if (SensorModule.isRunning()) {
                    SensorModule.stop();
                    _detachReviewEvents();
                    VisualModule.reset();
                    SpectrogramModule.reset();
                    PsdModule.reset();
                    HvsrModule.reset();
                    _sensorInited = false;
                    sensorStartBtn.hidden = false;
                    sensorStopBtn.hidden  = true;
                    sensorResetBtn.hidden = true;
                    sensorStatus.textContent = '버튼을 눌러 센서 권한을 요청하세요.';
                }
            }
        }

        tabSensor.addEventListener('click', () => switchTab('sensor'));
        tabFile.addEventListener('click',   () => switchTab('file'));
    </script>

</body>
</html>
